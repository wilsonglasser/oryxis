name: Release relay

# Triggered by tags of the form `relay-v0.1.0`. Builds the
# `oryxis-relay` Docker image for amd64 + arm64 and publishes to
# `ghcr.io/wilsonglasser/oryxis-relay:<version>` plus `:latest`.
#
# Users self-host with:
#   docker run -d \
#     -p 8080:8080 \
#     -e ORYXIS_RELAY_TOKEN=<long-random-string> \
#     ghcr.io/wilsonglasser/oryxis-relay:latest

on:
  push:
    tags:
      - 'relay-v*'

permissions:
  contents: read
  packages: write

jobs:
  # Per-platform native builds (no QEMU). Each runner produces a
  # single-arch image digest; the `manifest` job below combines them
  # into the published multi-arch tag.
  docker-build:
    name: Build relay image (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - label: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#relay-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/oryxis-relay/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/oryxis-relay,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.label }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Push multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          version="${{ needs.docker-build.outputs.version }}"
          repo="ghcr.io/${{ github.repository_owner }}/oryxis-relay"
          docker buildx imagetools create \
            -t "${repo}:${version}" \
            -t "${repo}:latest" \
            $(printf "${repo}@sha256:%s " *)

  binary:
    name: Build standalone binary ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - label: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p oryxis-relay
      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          mkdir -p dist
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then ext=".exe"; fi
          bin="target/${{ matrix.target }}/release/oryxis-relay${ext}"
          name="oryxis-relay-${tag}-${{ matrix.label }}${ext}"
          cp "${bin}" "dist/${name}"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
