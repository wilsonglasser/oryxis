name: Nightly

# Rolling per-commit build of just the main `oryxis` app (no plugins,
# no installers). Each successful run replaces the `nightly` GitHub
# Release so the link to the latest unstable binary never moves.

on:
  push:
    branches: [main]
    # Skip pure docs / screenshot / signaling-worker churn since the
    # binary doesn't change. CI still runs on those via ci.yml.
    paths-ignore:
      - '**/*.md'
      - 'resources/screen_*.png'
      - 'resources/screen_*.gif'
      - 'signaling-worker/**'
      - '.github/workflows/release*.yml'

# Cancel an in-flight nightly when a newer commit lands. The rolling
# `nightly` release would just be overwritten anyway, so the older run
# is wasted compute.
concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Same signaling endpoint the release builds bake in, so a nightly
  # is exercised against the same server the user-facing tagged
  # builds use.
  ORYXIS_SIGNALING_URL: ${{ secrets.ORYXIS_SIGNALING_URL }}
  ORYXIS_SIGNALING_TOKEN: ${{ secrets.ORYXIS_SIGNALING_TOKEN }}

jobs:
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev \
            libgtk-3-dev libwayland-dev libxkbcommon-dev
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: linux-x86-nightly-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p oryxis-app
      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/oryxis dist/
          cp README.md resources/logo_64.png resources/oryxis.desktop dist/
          cd dist && tar czf ../oryxis-nightly-linux-x86_64.tar.gz *
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-nightly-linux-x86_64
          path: oryxis-nightly-linux-x86_64.tar.gz

  build-linux-arm:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev \
            libgtk-3-dev libwayland-dev libxkbcommon-dev
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: linux-arm-nightly-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p oryxis-app
      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/oryxis dist/
          cp README.md resources/logo_64.png resources/oryxis.desktop dist/
          cd dist && tar czf ../oryxis-nightly-linux-aarch64.tar.gz *
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-nightly-linux-aarch64
          path: oryxis-nightly-linux-aarch64.tar.gz

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: macos-arm-nightly-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p oryxis-app
      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/oryxis dist/
          cp README.md resources/logo_64.png dist/
          cd dist && tar czf ../oryxis-nightly-macos-aarch64.tar.gz *
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-nightly-macos-aarch64
          path: oryxis-nightly-macos-aarch64.tar.gz

  build-windows-x86:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: windows-x86-nightly-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p oryxis-app
      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\oryxis.exe dist\
          Copy-Item README.md dist\
          Copy-Item resources\logo_64.png dist\
          Compress-Archive -Path dist\* -DestinationPath oryxis-nightly-windows-x86_64.zip
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-nightly-windows-x86_64
          path: oryxis-nightly-windows-x86_64.zip

  build-windows-arm:
    name: Windows ARM64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: windows-arm-nightly-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release --target aarch64-pc-windows-msvc -p oryxis-app
      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\aarch64-pc-windows-msvc\release\oryxis.exe dist\
          Copy-Item README.md dist\
          Copy-Item resources\logo_64.png dist\
          Compress-Archive -Path dist\* -DestinationPath oryxis-nightly-windows-aarch64.zip
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-nightly-windows-aarch64
          path: oryxis-nightly-windows-aarch64.zip

  publish:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86
      - build-linux-arm
      - build-macos-arm
      - build-windows-x86
      - build-windows-arm
    steps:
      - uses: actions/checkout@v5
        with:
          # Need the tag refs locally so `git tag -f nightly` finds
          # the previous one to overwrite, and so the SHA shows up in
          # release notes.
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Compute build metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short=8 HEAD)
          STAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "stamp=$STAMP" >> "$GITHUB_OUTPUT"
      - name: Replace nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Drop any previous nightly release and its tag (suppress 404
          # so the very first run still succeeds). `--cleanup-tag`
          # nukes the rolling tag so the next `gh release create` can
          # recreate it pointing at the new commit.
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

          NOTES=$(cat <<NOTE
          Automated nightly build of the \`oryxis\` app, no plugins or installers.

          - **Commit:** \`${{ github.sha }}\` (\`${{ steps.meta.outputs.sha_short }}\`)
          - **Built:** ${{ steps.meta.outputs.stamp }}

          Each push to \`main\` overwrites this release. For stable
          builds and Windows installers, grab the [latest tagged
          release](https://github.com/${{ github.repository }}/releases/latest).
          NOTE
          )

          gh release create nightly \
            --prerelease \
            --title "Nightly (${{ steps.meta.outputs.sha_short }})" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA" \
            dist/*
