name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing the build/package steps (e.g. the macOS
  # .dmg) without cutting a release. The publishing jobs below are gated
  # on a tag ref, so a manual run only produces downloadable artifacts.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ORYXIS_SIGNALING_URL: ${{ secrets.ORYXIS_SIGNALING_URL }}
  ORYXIS_SIGNALING_TOKEN: ${{ secrets.ORYXIS_SIGNALING_TOKEN }}

jobs:
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev \
            libgtk-3-dev libwayland-dev libxkbcommon-dev fuse libfuse2
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: linux-x86-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/oryxis dist/
          cp README.md resources/logo_64.png resources/oryxis.desktop dist/
          cd dist && tar czf ../oryxis-linux-x86_64.tar.gz *

      # `.deb` for Debian/Ubuntu/derivatives. cargo-deb reads
      # [package.metadata.deb] in oryxis-app/Cargo.toml.
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: |
          cargo deb -p oryxis-app --no-build
          cp target/debian/*.deb oryxis-linux-x86_64.deb

      # AppImage via linuxdeploy. Builds an .AppDir with the binary +
      # .desktop + icon, then bundles it into a single self-contained
      # executable that runs on most modern Linux distros.
      - name: Build AppImage
        run: |
          set -e
          curl -L -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/oryxis AppDir/usr/bin/
          cp resources/oryxis.desktop AppDir/usr/share/applications/
          cp resources/logo_256.png AppDir/usr/share/icons/hicolor/256x256/apps/oryxis.png
          ./linuxdeploy --appdir AppDir --output appimage
          mv Oryxis-*.AppImage oryxis-linux-x86_64.AppImage 2>/dev/null \
            || mv oryxis-*.AppImage oryxis-linux-x86_64.AppImage 2>/dev/null \
            || mv *.AppImage oryxis-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v7
        with:
          name: oryxis-linux-x86_64
          path: |
            oryxis-linux-x86_64.tar.gz
            oryxis-linux-x86_64.deb
            oryxis-linux-x86_64.AppImage

  build-linux-arm:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev \
            libgtk-3-dev libwayland-dev libxkbcommon-dev fuse libfuse2
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: linux-arm-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/oryxis dist/
          cp README.md resources/logo_64.png resources/oryxis.desktop dist/
          cd dist && tar czf ../oryxis-linux-aarch64.tar.gz *
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: |
          cargo deb -p oryxis-app --no-build
          cp target/debian/*.deb oryxis-linux-aarch64.deb
      - name: Build AppImage
        run: |
          set -e
          curl -L -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
          chmod +x linuxdeploy
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/oryxis AppDir/usr/bin/
          cp resources/oryxis.desktop AppDir/usr/share/applications/
          cp resources/logo_256.png AppDir/usr/share/icons/hicolor/256x256/apps/oryxis.png
          ./linuxdeploy --appdir AppDir --output appimage
          mv Oryxis-*.AppImage oryxis-linux-aarch64.AppImage 2>/dev/null \
            || mv oryxis-*.AppImage oryxis-linux-aarch64.AppImage 2>/dev/null \
            || mv *.AppImage oryxis-linux-aarch64.AppImage
      - uses: actions/upload-artifact@v7
        with:
          name: oryxis-linux-aarch64
          path: |
            oryxis-linux-aarch64.tar.gz
            oryxis-linux-aarch64.deb
            oryxis-linux-aarch64.AppImage

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: macos-arm-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/release/oryxis dist/
          cp README.md resources/logo_64.png dist/
          cd dist && tar czf ../oryxis-macos-aarch64.tar.gz *
      - name: Build .app bundle
        run: |
          # On a tag the ref is v0.7.4 -> 0.7.4. On a manual workflow_dispatch
          # run GITHUB_REF_NAME is a branch name, so fall back to a dummy.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0"
          fi
          APP="Oryxis.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/oryxis "$APP/Contents/MacOS/oryxis"
          cp resources/Oryxis.icns "$APP/Contents/Resources/Oryxis.icns"
          sed "s/__VERSION__/${VERSION}/g" resources/Info.plist > "$APP/Contents/Info.plist"
      - name: Sign .app bundle
        # Developer ID signing when secrets are present; otherwise an ad-hoc
        # signature so the bundle is at least internally consistent. An ad-hoc
        # build is still quarantined when downloaded (Gatekeeper warning) until
        # the Developer ID secrets are added and notarization below kicks in.
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          APP="Oryxis.app"
          if [ -n "$APPLE_CERT_P12_BASE64" ]; then
            KEYCHAIN="$RUNNER_TEMP/build.keychain"
            KEYCHAIN_PW="$(uuidgen)"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
              -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
            security list-keychains -d user -s "$KEYCHAIN" login.keychain
            codesign --force --deep --options runtime --timestamp \
              --sign "$APPLE_SIGN_IDENTITY" "$APP"
          else
            echo "No Developer ID secrets set; applying ad-hoc signature."
            codesign --force --deep --sign - "$APP"
          fi
      - name: Build .dmg
        run: |
          STAGING="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGING"
          cp -R Oryxis.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Oryxis" -srcfolder "$STAGING" \
            -ov -format UDZO oryxis-macos-aarch64.dmg
      - name: Notarize .dmg
        # Runs only when the App Store Connect secrets are present. Submits the
        # .dmg to Apple, waits for the ticket, then staples it so the app opens
        # with no Gatekeeper prompt even offline. Note: the signing secrets
        # (APPLE_CERT_*) and these notary secrets are a package deal. Apple
        # rejects anything that is not Developer-ID-signed with hardened
        # runtime, so notarization only makes sense once the cert is in place.
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Developer ID cert; skipping notarization (ad-hoc build)."
            exit 0
          fi
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            xcrun notarytool submit oryxis-macos-aarch64.dmg \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple oryxis-macos-aarch64.dmg
          else
            echo "No notarization secrets set; shipping unsigned .dmg."
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: oryxis-macos-aarch64
          path: |
            oryxis-macos-aarch64.tar.gz
            oryxis-macos-aarch64.dmg

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: windows-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\oryxis.exe dist\
          Copy-Item README.md dist\
          Copy-Item resources\logo_64.png dist\
          Compress-Archive -Path dist\* -DestinationPath oryxis-windows-x86_64.zip
      - name: Install NSIS + EnVar plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # choco community repo occasionally returns 503s — retry a few times.
          $max = 5
          $ok = $false
          for ($i = 1; $i -le $max -and -not $ok; $i++) {
            Write-Host "NSIS install attempt $i/$max"
            choco install nsis -y --no-progress
            if ($LASTEXITCODE -eq 0) { $ok = $true }
            elseif ($i -lt $max) { Start-Sleep -Seconds 20 }
          }
          if (-not $ok) { throw "choco install nsis failed after $max attempts" }
          if (-not (Test-Path 'C:\Program Files (x86)\NSIS\makensis.exe')) {
            throw 'makensis.exe not found after install'
          }
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\NSIS'

          # EnVar plugin — adds PATH manipulation primitives to NSIS
          # (AddValue/DeleteValue with dedup + WM_SETTINGCHANGE
          # broadcast). The NSIS wiki itself recommends EnVar over
          # raw WriteRegExpandStr, which truncates at NSIS_MAX_STRLEN
          # (1024 chars). Pinned to v0.3.1 from the GitHub mirror at
          # GsNSIS/EnVar.
          $envarZip = "$env:RUNNER_TEMP\EnVar.zip"
          $envarDir = "$env:RUNNER_TEMP\EnVar"
          Invoke-WebRequest `
            -Uri 'https://github.com/GsNSIS/EnVar/releases/download/v0.3.1/EnVar-Plugin.zip' `
            -OutFile $envarZip
          Expand-Archive -Path $envarZip -DestinationPath $envarDir -Force
          # The choco nsis package doesn't pre-create the per-arch
          # plugin subdirs, so make sure they exist before copying.
          New-Item -ItemType Directory -Force -Path 'C:\Program Files (x86)\NSIS\Plugins\amd64-unicode' | Out-Null
          New-Item -ItemType Directory -Force -Path 'C:\Program Files (x86)\NSIS\Plugins\x86-unicode' | Out-Null
          Copy-Item "$envarDir\Plugins\amd64-unicode\EnVar.dll" 'C:\Program Files (x86)\NSIS\Plugins\amd64-unicode\' -Force
          Copy-Item "$envarDir\Plugins\x86-unicode\EnVar.dll" 'C:\Program Files (x86)\NSIS\Plugins\x86-unicode\' -Force
      - name: Build installers
        shell: pwsh
        run: |
          # Strip the leading "v" from the tag so DisplayVersion is a
          # plain SemVer (winget compares these against its manifest).
          $version = "${{ github.ref_name }}".TrimStart('v')
          cd resources
          # System installer (UAC, %ProgramFiles%) — winget targets this one.
          makensis "/DVERSION=$version" "/DARCH=x86_64" "/DBINPATH=..\target\release" installer.nsi
          # Per-user installer (no UAC, %LOCALAPPDATA%) — auto-updater
          # picks this when the running exe lives under LOCALAPPDATA.
          makensis "/DVERSION=$version" "/DARCH=x86_64" "/DBINPATH=..\target\release" installer-user.nsi
      - uses: actions/upload-artifact@v7
        with:
          name: oryxis-windows-x86_64
          path: |
            oryxis-windows-x86_64.zip
            oryxis-setup-x86_64.exe
            oryxis-user-setup-x86_64.exe

  build-windows-arm:
    name: Windows ARM64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: windows-arm-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release --target aarch64-pc-windows-msvc
      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\aarch64-pc-windows-msvc\release\oryxis.exe dist\
          Copy-Item README.md dist\
          Copy-Item resources\logo_64.png dist\
          Compress-Archive -Path dist\* -DestinationPath oryxis-windows-aarch64.zip
      - name: Install NSIS + EnVar plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $max = 5
          $ok = $false
          for ($i = 1; $i -le $max -and -not $ok; $i++) {
            Write-Host "NSIS install attempt $i/$max"
            choco install nsis -y --no-progress
            if ($LASTEXITCODE -eq 0) { $ok = $true }
            elseif ($i -lt $max) { Start-Sleep -Seconds 20 }
          }
          if (-not $ok) { throw "choco install nsis failed after $max attempts" }
          if (-not (Test-Path 'C:\Program Files (x86)\NSIS\makensis.exe')) {
            throw 'makensis.exe not found after install'
          }
          Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\NSIS'
          $envarZip = "$env:RUNNER_TEMP\EnVar.zip"
          $envarDir = "$env:RUNNER_TEMP\EnVar"
          Invoke-WebRequest `
            -Uri 'https://github.com/GsNSIS/EnVar/releases/download/v0.3.1/EnVar-Plugin.zip' `
            -OutFile $envarZip
          Expand-Archive -Path $envarZip -DestinationPath $envarDir -Force
          New-Item -ItemType Directory -Force -Path 'C:\Program Files (x86)\NSIS\Plugins\amd64-unicode' | Out-Null
          New-Item -ItemType Directory -Force -Path 'C:\Program Files (x86)\NSIS\Plugins\x86-unicode' | Out-Null
          Copy-Item "$envarDir\Plugins\amd64-unicode\EnVar.dll" 'C:\Program Files (x86)\NSIS\Plugins\amd64-unicode\' -Force
          Copy-Item "$envarDir\Plugins\x86-unicode\EnVar.dll" 'C:\Program Files (x86)\NSIS\Plugins\x86-unicode\' -Force
      - name: Build installers
        shell: pwsh
        run: |
          # ARM64 installer is built by the (x86) NSIS toolchain on a
          # cross-compile host — the produced .exe runs under x86
          # emulation on Windows on ARM and lays down native ARM64
          # binaries.
          $version = "${{ github.ref_name }}".TrimStart('v')
          cd resources
          makensis "/DVERSION=$version" "/DARCH=aarch64" "/DBINPATH=..\target\aarch64-pc-windows-msvc\release" installer.nsi
          makensis "/DVERSION=$version" "/DARCH=aarch64" "/DBINPATH=..\target\aarch64-pc-windows-msvc\release" installer-user.nsi
      - uses: actions/upload-artifact@v7
        with:
          name: oryxis-windows-aarch64
          path: |
            oryxis-windows-aarch64.zip
            oryxis-setup-aarch64.exe
            oryxis-user-setup-aarch64.exe

  release:
    name: Create Release
    needs: [build-linux-x86, build-linux-arm, build-macos-arm, build-windows, build-windows-arm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          name: oryxis-linux-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: oryxis-linux-aarch64
      - uses: actions/download-artifact@v8
        with:
          name: oryxis-macos-aarch64
      - uses: actions/download-artifact@v8
        with:
          name: oryxis-windows-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: oryxis-windows-aarch64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            oryxis-linux-x86_64.tar.gz
            oryxis-linux-x86_64.deb
            oryxis-linux-x86_64.AppImage
            oryxis-linux-aarch64.tar.gz
            oryxis-linux-aarch64.deb
            oryxis-linux-aarch64.AppImage
            oryxis-macos-aarch64.tar.gz
            oryxis-macos-aarch64.dmg
            oryxis-windows-x86_64.zip
            oryxis-setup-x86_64.exe
            oryxis-user-setup-x86_64.exe
            oryxis-windows-aarch64.zip
            oryxis-setup-aarch64.exe
            oryxis-user-setup-aarch64.exe

  winget:
    name: Publish to winget
    needs: [release]
    runs-on: windows-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: WilsonGlasser.Oryxis
          # Match both x86_64 and aarch64 system installers in a single
          # submission. Komac (the action's backend) reads the PE
          # header of each .exe and emits one manifest with multiple
          # `Installers:` entries — same pattern Edge / Bun / Node use.
          # The per-user installers (oryxis-user-setup-*) are
          # deliberately excluded; winget targets the system installer.
          installers-regex: 'oryxis-setup-(x86_64|aarch64)\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
