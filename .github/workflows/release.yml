name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ORYXIS_SIGNALING_URL: ${{ secrets.ORYXIS_SIGNALING_URL }}
  ORYXIS_SIGNALING_TOKEN: ${{ secrets.ORYXIS_SIGNALING_TOKEN }}

jobs:
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev \
            libgtk-3-dev libwayland-dev libxkbcommon-dev
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: linux-x86-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/oryxis target/release/oryxis-mcp dist/
          cp README.md resources/logo_64.png resources/oryxis.desktop dist/
          cd dist && tar czf ../oryxis-linux-x86_64.tar.gz *
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-linux-x86_64
          path: oryxis-linux-x86_64.tar.gz

  build-linux-arm:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev \
            libgtk-3-dev libwayland-dev libxkbcommon-dev
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: linux-arm-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/oryxis target/release/oryxis-mcp dist/
          cp README.md resources/logo_64.png resources/oryxis.desktop dist/
          cd dist && tar czf ../oryxis-linux-aarch64.tar.gz *
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-linux-aarch64
          path: oryxis-linux-aarch64.tar.gz

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: macos-arm-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/oryxis target/release/oryxis-mcp dist/
          cp README.md resources/logo_64.png dist/
          cd dist && tar czf ../oryxis-macos-aarch64.tar.gz *
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-macos-aarch64
          path: oryxis-macos-aarch64.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: windows-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\oryxis.exe dist\
          Copy-Item target\release\oryxis-mcp.exe dist\
          Copy-Item README.md dist\
          Copy-Item resources\logo_64.png dist\
          Compress-Archive -Path dist\* -DestinationPath oryxis-windows-x86_64.zip
      - name: Build installer
        shell: pwsh
        run: |
          # NSIS is pre-installed on windows-latest; no external package
          # manager needed (choco community repo has flaky availability).
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          cd resources
          makensis installer.nsi
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-windows-x86_64
          path: |
            oryxis-windows-x86_64.zip
            oryxis-setup-x86_64.exe

  build-windows-arm:
    name: Windows ARM64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: windows-arm-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release --target aarch64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\aarch64-pc-windows-msvc\release\oryxis.exe dist\
          Copy-Item target\aarch64-pc-windows-msvc\release\oryxis-mcp.exe dist\
          Copy-Item README.md dist\
          Copy-Item resources\logo_64.png dist\
          Compress-Archive -Path dist\* -DestinationPath oryxis-windows-aarch64.zip
      - uses: actions/upload-artifact@v5
        with:
          name: oryxis-windows-aarch64
          path: oryxis-windows-aarch64.zip

  release:
    name: Create Release
    needs: [build-linux-x86, build-linux-arm, build-macos-arm, build-windows, build-windows-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: oryxis-linux-x86_64
      - uses: actions/download-artifact@v5
        with:
          name: oryxis-linux-aarch64
      - uses: actions/download-artifact@v5
        with:
          name: oryxis-macos-aarch64
      - uses: actions/download-artifact@v5
        with:
          name: oryxis-windows-x86_64
      - uses: actions/download-artifact@v5
        with:
          name: oryxis-windows-aarch64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            oryxis-linux-x86_64.tar.gz
            oryxis-linux-aarch64.tar.gz
            oryxis-macos-aarch64.tar.gz
            oryxis-windows-x86_64.zip
            oryxis-setup-x86_64.exe
            oryxis-windows-aarch64.zip

  winget:
    name: Publish to winget
    needs: [release]
    runs-on: windows-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: WilsonGlasser.Oryxis
          installers-regex: 'oryxis-setup-x86_64\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
