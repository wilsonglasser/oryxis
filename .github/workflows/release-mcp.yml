name: Release MCP plugin

# Triggered by tags of the form `mcp-v0.1.0`. Builds the `oryxis-mcp`
# binary for every supported platform, signs each with the production
# Ed25519 key (from the `ORYXIS_SIGNING_KEY` secret), uploads
# everything to the GitHub Release, and finally builds the `mcp.json`
# manifest from the same-release assets and uploads that too.
#
# MCP is a plugin from a distribution standpoint only. Unlike AWS,
# the app doesn't spawn the binary; external MCP clients (Claude
# Desktop / Code, Cursor) do, after pointing their config at the
# stable launcher path the install layer maintains. The protocol
# version field in the manifest is set to `[1]` so the host's
# plugin-manifest filter passes; MCP's own JSON-RPC contract is
# entirely separate.

on:
  push:
    tags:
      - 'mcp-v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ''
          - label: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            ext: ''
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'
          - label: windows-aarch64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            ext: '.exe'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: mcp-plugin-${{ matrix.label }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build plugin (release)
        run: cargo build --release -p oryxis-mcp --target ${{ matrix.target }}

      - name: Strip (unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/oryxis-mcp${{ matrix.ext }}

      - name: Build signer
        run: cargo build --release -p oryxis-plugin-signer

      - name: Sign + hash
        shell: bash
        env:
          ORYXIS_SIGNING_KEY: ${{ secrets.ORYXIS_SIGNING_KEY }}
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/oryxis-mcp${{ matrix.ext }}"
          OUT="dist/oryxis-mcp-${{ matrix.label }}${{ matrix.ext }}"
          mkdir -p dist
          cp "$BIN" "$OUT"
          # The signer prints `sha256 = …`, `signature_b64 = …`,
          # and `size = …` on three separate lines.
          ./target/release/oryxis-plugin-signer sign "$BIN" > "$OUT.signinfo"
          grep '^sha256'        "$OUT.signinfo" | awk '{print $3}' > "$OUT.sha256"
          grep '^signature_b64' "$OUT.signinfo" | awk '{print $3}' > "$OUT.sig"
          grep '^size'          "$OUT.signinfo" | awk '{print $3}' > "$OUT.size"
          rm "$OUT.signinfo"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/oryxis-mcp-${{ matrix.label }}${{ matrix.ext }}
            dist/oryxis-mcp-${{ matrix.label }}${{ matrix.ext }}.sig
            dist/oryxis-mcp-${{ matrix.label }}${{ matrix.ext }}.sha256
            dist/oryxis-mcp-${{ matrix.label }}${{ matrix.ext }}.size

  manifest:
    name: Publish manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ github.ref_name }}'
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=${TAG#mcp-v}" >> "$GITHUB_OUTPUT"

      - name: Download sidecars from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'oryxis-mcp-*.sha256' \
            --pattern 'oryxis-mcp-*.sig' \
            --pattern 'oryxis-mcp-*.size' \
            --dir assets

      - name: Build mcp.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.tag.outputs.version }}'
          TAG='${{ steps.tag.outputs.tag }}'
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Build the binaries array via jq so JSON escaping is correct
          # and we avoid heredocs (which collide with the YAML block
          # scalar's indent rules: a dedented `EOF` ends the YAML scalar
          # before bash sees it).
          binaries='[]'
          for sha_file in assets/oryxis-mcp-*.sha256; do
            [ -f "$sha_file" ] || continue
            base="${sha_file%.sha256}"
            name=$(basename "$base")
            # Parse `os` + `arch` from the filename:
            #   oryxis-mcp-linux-x86_64
            #   oryxis-mcp-windows-aarch64.exe
            stripped="${name#oryxis-mcp-}"
            stripped="${stripped%.exe}"
            os="${stripped%-*}"
            arch="${stripped##*-}"
            sha=$(cat "$base.sha256")
            sig=$(cat "$base.sig")
            size=$(cat "$base.size")
            binaries=$(echo "$binaries" | jq \
              --arg os "$os" \
              --arg arch "$arch" \
              --arg url "$BASE/$name" \
              --arg sha "$sha" \
              --arg sig "$sig" \
              --argjson size "$size" \
              '. + [{os: $os, arch: $arch, url: $url, sha256: $sha, signature: $sig, size: $size}]')
          done

          jq -n \
            --arg version "$VERSION" \
            --argjson binaries "$binaries" \
            '{
              provider_id: "mcp",
              versions: [
                {
                  version: $version,
                  protocol_versions: [1],
                  min_app: "0.7.0",
                  binaries: $binaries
                }
              ]
            }' > mcp.json

          echo '--- mcp.json ---'
          cat mcp.json

      - name: Upload mcp.json to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: mcp.json
