name: Update AWS plugin manifest

# Runs after `release-aws.yml` finishes. Reads the release the user
# just published (assets uploaded by `release-aws`) and publishes a
# fresh `aws.json` manifest to the `gh-pages` branch so the app's
# update-check flow can see the new version.
#
# Triggers:
#   - automatic, when `release-aws` completes successfully
#   - manual via `workflow_dispatch` with a tag input (re-publish
#     the manifest for an existing release without rebuilding)

on:
  workflow_run:
    workflows: ['Release AWS plugin']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish the manifest for (e.g. aws-v0.4.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish manifest to gh-pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve target tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            # Pick the most recent `aws-v*` tag the release-aws run
            # finished on; falling back to the workflow_run's head_branch
            # which is the tag for tag-triggered runs.
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          if [ -z "$TAG" ]; then
            echo "could not resolve a release tag"; exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Strip the `aws-v` prefix for the manifest version field.
          echo "version=${TAG#aws-v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "${{ steps.tag.outputs.tag }}" --dir assets

      - name: Build manifest JSON
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.tag.outputs.version }}'
          TAG='${{ steps.tag.outputs.tag }}'
          REPO='${{ github.repository }}'
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Build a `binaries` array entry per platform we shipped.
          # Each platform contributes one binary + three sidecar files
          # whose contents we slurp into the manifest fields.
          entries=()
          for f in assets/oryxis-cloud-aws-plugin-*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.sig|*.sha256|*.size) continue ;;
            esac
            name=$(basename "$f")
            # Parse os/arch from the filename
            #   oryxis-cloud-aws-plugin-linux-x86_64
            #   oryxis-cloud-aws-plugin-windows-aarch64.exe
            stripped="${name#oryxis-cloud-aws-plugin-}"
            stripped="${stripped%.exe}"
            os="${stripped%-*}"
            arch="${stripped##*-}"
            sha=$(cat "$f.sha256")
            sig=$(cat "$f.sig")
            size=$(cat "$f.size")
            entries+=("$(cat <<EOF
            {
              "os": "$os",
              "arch": "$arch",
              "url": "$BASE/$name",
              "sha256": "$sha",
              "signature": "$sig",
              "size": $size
            }
EOF
)")
          done
          # Comma-separated join, JSON is whitespace-tolerant.
          binaries=$(IFS=$',\n'; echo "${entries[*]}")

          cat > aws.json <<EOF
          {
            "provider_id": "aws",
            "versions": [
              {
                "version": "$VERSION",
                "protocol_versions": [1],
                "min_app": "0.9.0",
                "binaries": [
          $binaries
                ]
              }
            ]
          }
          EOF
          echo "Built manifest for $VERSION"
          cat aws.json

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Worktree the gh-pages branch so we can write a single file
          # without leaving the main checkout.
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages gh-pages
          else
            git worktree add --orphan -b gh-pages gh-pages
            (cd gh-pages && git rm -rf . >/dev/null 2>&1 || true)
          fi
          cp aws.json gh-pages/aws.json
          cd gh-pages
          git add aws.json
          if git diff --cached --quiet; then
            echo "manifest unchanged"
          else
            git commit -m "manifest: aws ${{ steps.tag.outputs.version }}"
            git push origin gh-pages
          fi
