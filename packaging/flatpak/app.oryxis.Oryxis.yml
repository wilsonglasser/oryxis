id: app.oryxis.Oryxis
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: oryxis

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=ssh-auth
  - --device=dri
  # SFTP browsing and ~/.ssh/config import need access to the user's files.
  - --filesystem=home

modules:
  - name: oryxis
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/oryxis/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo build --release --offline --locked -p oryxis-app
      - install -Dm755 target/release/oryxis /app/bin/oryxis
      - install -Dm644 resources/app.oryxis.Oryxis.desktop /app/share/applications/app.oryxis.Oryxis.desktop
      - install -Dm644 resources/app.oryxis.Oryxis.metainfo.xml /app/share/metainfo/app.oryxis.Oryxis.metainfo.xml
      - install -Dm644 resources/logo_64.png /app/share/icons/hicolor/64x64/apps/app.oryxis.Oryxis.png
      - install -Dm644 resources/logo_128.png /app/share/icons/hicolor/128x128/apps/app.oryxis.Oryxis.png
      - install -Dm644 resources/logo_256.png /app/share/icons/hicolor/256x256/apps/app.oryxis.Oryxis.png
    sources:
      # Pinned to the post-v0.8.0 commit that adds the AppStream metainfo, the
      # desktop file and the Wayland app_id fix (all absent from the v0.8.0
      # tag). Cargo.lock is unchanged from v0.8.0, so cargo-sources.json holds.
      - type: git
        url: https://github.com/wilsonglasser/oryxis.git
        commit: 8591730a10f536ba2d0b09c33c9b86136d33bbf1
      - cargo-sources.json
